<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f3a6a6" />
    <title>拾光卡片</title>
    <link rel="manifest" href="/manifest.webmanifest?v=20260612-ins2" />
    <link rel="stylesheet" href="/static/styles.css?v=20260612-ins2" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-label="拾光卡片">
        <div>
          <p class="eyebrow">拾光卡片</p>
          <h1>今天，看见了什么？</h1>
        </div>
        <button class="icon-button" id="syncButton" title="同步离线草稿" aria-label="同步离线草稿">
          <span aria-hidden="true">↻</span>
          <span class="draft-count" id="draftCount">0</span>
        </button>
      </section>

      <section class="unlock-panel hidden" id="unlockPanel">
        <label for="passcodeInput">暗号</label>
        <div class="inline-form">
          <input id="passcodeInput" type="password" autocomplete="current-password" placeholder="输入你的私人暗号" />
          <button id="unlockButton">进入</button>
        </div>
      </section>

      <section class="capture-band" id="captureBand">
        <input id="photoInput" type="file" accept="image/*" capture="environment" hidden />
        <button class="capture-button" id="captureButton">
          <span class="capture-dot"></span>
          <span>拍一张</span>
        </button>
        <p id="statusText">拍照后会自动裁成记录卡片，识别内容并保存。</p>
      </section>

      <section class="filters">
        <input id="searchInput" type="search" placeholder="搜索食物、物品、标签或备注" />
        <select id="categorySelect" aria-label="分类筛选">
          <option value="">全部</option>
          <option value="food">食物</option>
          <option value="daily">日常</option>
          <option value="object">物品</option>
          <option value="place">地点</option>
        </select>
      </section>

      <section class="timeline" id="timeline" aria-live="polite"></section>
    </main>

    <dialog id="editDialog">
      <form method="dialog" class="edit-form" id="editForm">
        <header>
          <h2>调整记录</h2>
          <button class="icon-button" value="cancel" title="关闭" aria-label="关闭">×</button>
        </header>
        <input type="hidden" id="editId" />
        <label>标题<input id="editTitle" /></label>
        <label>文案<textarea id="editCaption" rows="3"></textarea></label>
        <label>标签<input id="editTags" placeholder="用逗号分隔" /></label>
        <label>备注<textarea id="editNotes" rows="3"></textarea></label>
        <div class="edit-grid">
          <label>卡路里估算<input id="editCalories" type="number" min="0" step="1" /></label>
          <label>份量<input id="editPortion" /></label>
        </div>
        <menu>
          <button value="cancel" type="button" id="cancelEdit">取消</button>
          <button value="default" id="saveEdit">保存</button>
        </menu>
      </form>
    </dialog>

    <template id="recordTemplate">
      <article class="record-card">
        <img class="record-image" alt="" />
        <div class="record-body">
          <div class="record-head">
            <div>
              <time></time>
              <h2></h2>
            </div>
            <span class="category-pill"></span>
          </div>
          <p class="caption"></p>
          <p class="calories hidden"></p>
          <div class="tags"></div>
          <div class="actions">
            <button class="edit">编辑</button>
            <button class="delete">删除</button>
          </div>
        </div>
      </article>
    </template>

    <script src="/static/app.js?v=20260612-ins2" type="module"></script>
  </body>
</html>
