services:
  - type: web
    name: shiguang-cards
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: STORAGE_BACKEND
        value: supabase
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: SUPABASE_STORAGE_BUCKET
        value: moment-photos
